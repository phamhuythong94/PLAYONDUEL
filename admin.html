<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — PlayOnDuel</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%230a0906'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='34' font-weight='700' fill='%23e8c780' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0a0906; --black-2:#121009; --charcoal:#1a1712;
    --gold:#c9a15a; --gold-bright:#e8c780; --gold-dim:#8a7343;
    --cream:#ece5d6; --cream-dim:#b8b0a0; --line:rgba(201,161,90,0.18);
    --serif:'Cormorant Garamond', serif; --sans:'Manrope', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--black); color:var(--cream); font-family:var(--sans); min-height:100vh;}
  .wrap{max-width:760px; margin:0 auto; padding:40px 24px 80px;}
  h1{font-family:var(--serif); font-size:30px; color:var(--gold-bright); margin-bottom:6px;}
  .muted{color:var(--cream-dim); font-size:13px; margin-bottom:32px;}
  a{color:var(--gold-dim);}

  .card{background:var(--charcoal); border:1px solid var(--line); border-radius:4px; padding:26px; margin-bottom:24px;}
  .card h2{font-family:var(--serif); font-size:20px; color:var(--cream); margin-bottom:16px;}

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:6px; font-weight:600;}
  .field input, .field select{
    width:100%; background:var(--black-2); border:1px solid var(--line); color:var(--cream);
    padding:11px 12px; border-radius:2px; font-family:var(--sans); font-size:14px;
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--gold);}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  .btn{padding:12px 20px; border-radius:2px; font-weight:700; font-size:13px; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; border:none;}
  .btn-primary{background:linear-gradient(135deg, var(--gold-bright), var(--gold)); color:var(--black);}
  .btn-ghost{background:transparent; border:1px solid var(--line); color:var(--cream-dim);}
  .btn-danger{background:transparent; border:1px solid rgba(200,90,80,0.4); color:#d18a80; font-size:12px; padding:6px 12px;}
  .btn-full{width:100%;}

  .list-item{display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--line); font-size:14px;}
  .list-item .meta{color:var(--cream-dim); font-size:12px;}
  .list-item .actions{display:flex; gap:8px;}

  #loginView{max-width:360px; margin:80px auto 0;}
  #appView{display:none;}
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;}
  .err{color:#d18a80; font-size:13px; margin-top:10px; display:none;}
  .toggle-row{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--cream-dim);}
</style>
</head>
<body>
<div class="wrap">

  <div id="loginView">
    <h1>PlayOnDuel Admin</h1>
    <p class="muted">This account is created manually in your Supabase dashboard — there's no public sign-up.</p>
    <div class="card">
      <div class="field"><label>Email</label><input type="email" id="loginEmail"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPassword"></div>
      <button class="btn btn-primary btn-full" id="loginBtn">Log in</button>
      <div class="err" id="loginErr"></div>
    </div>
    <a href="index.html">&larr; Back to site</a>
  </div>

  <div id="appView">
    <div class="topbar">
      <div>
        <h1>Admin Dashboard</h1>
        <p class="muted">Signed in as <span id="whoami"></span> · <a href="index.html">View site</a></p>
      </div>
      <button class="btn btn-ghost" id="logoutBtn">Log out</button>
    </div>

    <div class="card">
      <h2>Add a win</h2>
      <div class="row2">
        <div class="field"><label>Casino</label><select id="wCasino"></select></div>
        <div class="field"><label>Amount won (USD)</label><input type="number" id="wAmount"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Player name</label><input type="text" id="wPlayer"></div>
        <div class="field"><label>Game</label><input type="text" id="wGame"></div>
      </div>
      <div class="field"><label>Screenshot (upload image)</label><input type="file" id="wImgFile" accept="image/*"></div>
      <div class="field" id="wImgPreviewWrap" style="display:none;"><img id="wImgPreview" style="max-width:120px; border-radius:2px; border:1px solid var(--line);"></div>
      <input type="hidden" id="wImg">
      <button class="btn btn-primary" id="wSave">Add win</button>
      <div class="err" id="wErr"></div>
      <div id="winsList" style="margin-top:20px;"></div>
    </div>

    <div class="card">
      <h2>Casinos / affiliate links</h2>
      <div class="field"><label>Name</label><input type="text" id="cName" placeholder="e.g. Duel"></div>
      <div class="row2">
        <div class="field"><label>Slug (short id, no spaces)</label><input type="text" id="cSlug" placeholder="e.g. duel"></div>
        <div class="field"><label>Sort order</label><input type="number" id="cSort" value="1"></div>
      </div>
      <div class="field"><label>Affiliate link</label><input type="text" id="cAff" placeholder="https://..."></div>
      <button class="btn btn-primary" id="cSave">Add casino</button>
      <div class="err" id="cErr"></div>
      <div id="casinoList" style="margin-top:20px;"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let casinos = [];

async function checkSession(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('appView').style.display = 'block';
    document.getElementById('whoami').textContent = session.user.email;
    await loadCasinos();
    await loadWins();
  } else {
    document.getElementById('loginView').style.display = 'block';
    document.getElementById('appView').style.display = 'none';
  }
}

document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = error.message; errEl.style.display = 'block'; return; }
  checkSession();
};

document.getElementById('logoutBtn').onclick = async () => {
  await sb.auth.signOut();
  checkSession();
};

async function loadCasinos(){
  const { data, error } = await sb.from('casinos').select('*').order('sort_order');
  if(error){ console.error(error); return; }
  casinos = data || [];

  const sel = document.getElementById('wCasino');
  sel.innerHTML = casinos.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');

  const list = document.getElementById('casinoList');
  list.innerHTML = casinos.map(c => `
    <div class="list-item">
      <div>
        <div>${escapeHtml(c.name)} <span class="meta">(${escapeHtml(c.slug)}) ${c.active ? '' : '— inactive'}</span></div>
        <div class="meta">${escapeHtml(c.aff_link)}</div>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" style="font-size:11px; padding:6px 10px;" onclick="toggleCasino('${c.id}', ${!c.active})">${c.active ? 'Deactivate' : 'Activate'}</button>
        <button class="btn btn-danger" onclick="deleteCasino('${c.id}')">Delete</button>
      </div>
    </div>
  `).join('');
}

async function loadWins(){
  const { data, error } = await sb.from('wins').select('*, casinos(name)').order('created_at', { ascending:false }).limit(50);
  if(error){ console.error(error); return; }
  const list = document.getElementById('winsList');
  list.innerHTML = (data || []).map(w => `
    <div class="list-item">
      <div>
        <div>${escapeHtml(w.player_name)} — $${Number(w.amount).toLocaleString('en-US')}</div>
        <div class="meta">${escapeHtml(w.casinos?.name || '')} · ${escapeHtml(w.game || '—')}</div>
      </div>
      <button class="btn btn-danger" onclick="deleteWin('${w.id}')">Delete</button>
    </div>
  `).join('') || '<p class="muted">No wins yet.</p>';
}

document.getElementById('wImgFile').onchange = () => {
  const file = document.getElementById('wImgFile').files[0];
  const wrap = document.getElementById('wImgPreviewWrap');
  if(file){
    document.getElementById('wImgPreview').src = URL.createObjectURL(file);
    wrap.style.display = 'block';
  } else {
    wrap.style.display = 'none';
  }
};

document.getElementById('wSave').onclick = async () => {
  const casino_id = document.getElementById('wCasino').value;
  const player_name = document.getElementById('wPlayer').value.trim();
  const game = document.getElementById('wGame').value.trim();
  const amount = parseFloat(document.getElementById('wAmount').value);
  const file = document.getElementById('wImgFile').files[0];
  const errEl = document.getElementById('wErr');
  errEl.style.display = 'none';

  if(!casino_id || !player_name || !amount || amount <= 0){
    errEl.textContent = 'Please fill in casino, player name and a valid amount.';
    errEl.style.display = 'block';
    return;
  }

  let image_url = '';
  if(file){
    const path = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
    const { error: upErr } = await sb.storage.from('wins').upload(path, file);
    if(upErr){ errEl.textContent = 'Image upload failed: ' + upErr.message; errEl.style.display = 'block'; return; }
    const { data: pub } = sb.storage.from('wins').getPublicUrl(path);
    image_url = pub.publicUrl;
  }

  const { error } = await sb.from('wins').insert({ casino_id, player_name, game, amount, image_url });
  if(error){ errEl.textContent = error.message; errEl.style.display = 'block'; return; }

  document.getElementById('wPlayer').value = '';
  document.getElementById('wGame').value = '';
  document.getElementById('wAmount').value = '';
  document.getElementById('wImgFile').value = '';
  document.getElementById('wImgPreviewWrap').style.display = 'none';
  loadWins();
};

document.getElementById('cSave').onclick = async () => {
  const name = document.getElementById('cName').value.trim();
  const slug = document.getElementById('cSlug').value.trim().toLowerCase();
  const aff_link = document.getElementById('cAff').value.trim();
  const sort_order = parseInt(document.getElementById('cSort').value) || 0;
  const errEl = document.getElementById('cErr');
  errEl.style.display = 'none';

  if(!name || !slug || !aff_link){
    errEl.textContent = 'Please fill in name, slug and affiliate link.';
    errEl.style.display = 'block';
    return;
  }

  const { error } = await sb.from('casinos').insert({ name, slug, aff_link, sort_order, active: true });
  if(error){ errEl.textContent = error.message; errEl.style.display = 'block'; return; }

  document.getElementById('cName').value = '';
  document.getElementById('cSlug').value = '';
  document.getElementById('cAff').value = '';
  document.getElementById('cSort').value = '1';
  loadCasinos();
};

async function deleteWin(id){
  if(!confirm('Delete this win entry?')) return;
  await sb.from('wins').delete().eq('id', id);
  loadWins();
}
async function deleteCasino(id){
  if(!confirm('Delete this casino and all its wins?')) return;
  await sb.from('casinos').delete().eq('id', id);
  loadCasinos(); loadWins();
}
async function toggleCasino(id, newActive){
  await sb.from('casinos').update({ active: newActive }).eq('id', id);
  loadCasinos();
}

function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML; }

checkSession();
</script>
</body>
</html>
